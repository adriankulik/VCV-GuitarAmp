name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    name: Run DSP Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile and run DSP tests
        run: |
          mkdir -p build_tests
          for test_file in tests/*.cpp; do
            base_name=$(basename "$test_file" .cpp)
            g++ -std=c++11 -Wall -Wextra "$test_file" -o "build_tests/$base_name"
            "./build_tests/$base_name"
          done

      - name: Build VCV Rack Plugin
        run: |
          pushd $HOME
          wget -O Rack-SDK.zip https://vcvrack.com/downloads/Rack-SDK-latest-lin-x64.zip
          unzip Rack-SDK.zip
          popd
          export RACK_DIR=$HOME/Rack-SDK
          make dep
          make dist
